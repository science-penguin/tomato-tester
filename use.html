<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="description" content="A free online tool for classifing a tomato as either ripe or not ripe">
<title>TomatoTester-USE</title>
</head>
<body style="display: flex;justify-content: center; text-align: center; flex-direction: column; background-color: rgb(190,200,240)";>
<h1 id="title">🍅Tomato Tester🍅</h1>
<button type="button" onclick="init()">Start</button>
<div id="webcam-container"></div>
<div id="display"></div>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
const URL = "https://teachablemachine.withgoogle.com/models/urG5vST10/";
let model, webcam, maxPredictions;
async function init() {
const modelURL = URL + "model.json";
const metadataURL = URL + "metadata.json";
model = await tmImage.load(modelURL, metadataURL);
maxPredictions = model.getTotalClasses();
const flip = true;
webcam = new tmImage.Webcam(200, 200, flip);
await webcam.setup({ facingMode: "environment" });
await webcam.play();
window.requestAnimationFrame(loop);
document.getElementById("webcam-container").appendChild(webcam.canvas);
}
async function loop() {
webcam.update();
await predict();
window.requestAnimationFrame(loop);
}
async function predict() {
const prediction = await model.predict(webcam.canvas);
let RipeProb = prediction[0].probability;
let UnripeProb = prediction[1].probability;
if (RipeProb >= UnripeProb) {
document.getElementById("display").innerHTML = "<p>RIPE</p>";
} else {
document.getElementById("display").innerHTML = "<p>UNRIPE</p>";
}
}
</script>
<script>
function updateSize() {
const text = "🍅Tomato Tester🍅"; 
const canvas = document.createElement("canvas"); 
const text_content = canvas.getContext("2d");
text_content.font = "20px Arial";
const width = text_content.measureText(text).width;
const newSize = Math.floor(window.innerWidth / (width / 15));
document.getElementById("title").style.setProperty("font-size", newSize + "px");
}
function checkDevice() {
const width_for_check = window.innerWidth;
const height_for_check = window.innerHeight;
const ratio = height_for_check / width_for_check;
const isMobile = ratio > 1;
if (!isMobile) {
window.location.href = "/desktop-home";
}
}
function onResize() {
updateSize();
checkDevice();
}
window.addEventListener("resize", onResize);
onResize()
</script>
</body>
</html>
